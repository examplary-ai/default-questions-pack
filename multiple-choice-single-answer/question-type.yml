$schema: https://schemas.examplary.ai/question-type.json

id: examplary.default.multiple-choice-single-answer
public: true
isDefault: true

name:
  en: Multiple choice
  nl: Meerkeuze
description:
  en: A question where students select one correct answer from multiple options.
  nl: Een vraag waarbij studenten één correct antwoord selecteren uit meerdere opties.

icon: ./icon.svg
components:
  assessment: ./component-assessment.tsx
  print: ./component-print.tsx
  settings-area: ./component-settings-area.tsx
  results: ./component-results.tsx

generation:
  enabled: true
  instructions: |
    Settings should look like this: {"options": ["Option 1", "Option 2", "Option 3"], "correctAnswer": "Option 2"}.
    Make sure the `correctAnswer` is always set, exactly matches one of the options strings, and that all options are unique.
    Also include exactly one scoring criteria, which should just be 'Correct answer selected', and be worth at least one point unless specified otherwise.
    If the answer is a math equation, it should be formatted like such: <inline-math>2x + 3 = 7</inline-math> - this ensures it will be displayed LaTeX-like.

scanning:
  instructions: |
    The answer should be a single string, in the format of "Option 2".
    Each value should exactly match one of the options specified in the settings, including punctuation and capitalisation. If the answer is close to one of the options, change it to match the option exactly. Only do this if the answer is very close to the option, otherwise leave it as is. The order of the answers does not matter.
    The student might instead use letters to specify their answer, eg. 'A' for the first option (index 0), 'B' for the second (index 1), etc. In that case, convert the letters to the corresponding options. Only do this if the answer is in the format of letters that correspond to the options, otherwise leave it as is.

hasSimpleScoring: true
timeEstimateMinutes: 1
shortcut: "3"
index: 200

settings:
  - id: options
    type: string-array
    name: Multiple choice answer options
    description: An array of option strings that represent the choices to the student. Each value can contain HTML.
    hidden: true
    required: true

  - id: correctAnswer
    type: string
    name: Correct answer
    description: The string of the correct answer value, matching the `value` field of the options. Needs to be an exact match to one of the options, including punctuation and capitalisation!
    hidden: true
    required: true

  - id: shuffleAnswers
    type: boolean
    name:
      en: Shuffle answer options
      nl: Willekeurige volgorde
    description: Whether to show the answer options in random order each time.
    default: false

export:
  qti3:
    interaction:
      type: ChoiceInteraction
      options:
        shuffle: "=$.question.settings.shuffleAnswers"
        choices: "=$map($.question.settings.options, function($option, $index) { { 'identifier': $option, 'content': $option } })"
        minChoices: 1
        maxChoices: 1

translations:
  option-placeholder:
    en: Add option...
    nl: Optie toevoegen...
  option-remove:
    en: Remove option
    nl: Optie verwijderen
  correct-answer:
    en: Correct answer
    nl: Correct antwoord
  options:
    en: Answer options
    nl: Antwoordopties
