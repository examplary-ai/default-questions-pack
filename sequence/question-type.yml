$schema: https://schemas.examplary.ai/question-type.json

id: examplary.expansion.sequence
public: true
isDefault: true

name:
  en: Sequence
  nl: Volgorde
description:
  en: Arrange items in the correct order.
  nl: Zet items in de juiste volgorde.

icon: ./icon.svg
components:
  assessment: ./component-assessment.tsx
  print: ./component-print.tsx
  results: ./component-results.tsx
  settings-area: ./component-settings-area.tsx

generation:
  enabled: true
  instructions: |
    Generate settings that look like this: {"options": ["First", "Second", "Third", "Fourth", "Fifth"], "correctAnswer": ["First", "Second", "Third", "Fourth", "Fifth"]},
    where `options` contains the items that the student should rearrange (can contain simple HTML markup), in the correct order, and `correctAnswer` should be the exact same.

scanning:
  instructions: |
    The answer should be an array of strings, in the format of ["First", "Second", "Third", "Fourth", "Fifth"].
    Each value should exactly match one of the options specified in the settings, including punctuation and capitalisation. If the answer is close to one of the options, change it to match the option exactly. ONLY DO THIS IF THE ANSWER IS VERY CLOSE TO THE OPTION, OTHERWISE LEAVE IT AS IS. The order of the answers matters, keep the order the STUDENT specified.
    The student might instead use letters to specify their answer, eg. 'A' for the first option (index 0), 'B' for the second (index 1), etc. In that case, convert the letters to the corresponding options in the correct order. ONLY DO THIS IF THE ANSWER IS IN THE FORMAT OF LETTERS THAT CORRESPOND TO THE OPTIONS, OTHERWISE LEAVE IT AS IS.

timeEstimateMinutes: 2
hasSimpleScoring: true

settings:
  - id: options
    type: string-array
    name: Options
    description: The items that the student should rearrange, in the correct order. Can contain simple HTML markup.
    hidden: true
    required: true

  - id: correctAnswer
    type: string-array
    name: Correct answer
    description: Should exactly mirror `options`.
    hidden: true
    required: true

export:
  qti3:
    interaction:
      type: OrderInteraction
      options:
        choices: "=$map($.question.settings.options, function($option, $index) { { 'identifier': $option, 'content': $option } })"

translations:
  options:
    en: Items to arrange
    nl: Items om te rangschikken
  help:
    en: Arrange the items in the correct order. They will be shown in a random order to the student.
    nl: Rangschik de items in de juiste volgorde. Ze worden in een willekeurige volgorde aan de student getoond.
  placeholder:
    en: Type option...
    nl: Typ optie...
  insert:
    en: Add item
    nl: Item toevoegen
