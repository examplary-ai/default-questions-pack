name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Release
        env:
          EXAMPLARY_API_KEY: ${{ secrets.EXAMPLARY_API_KEY }}
        run: |
          # Install dependencies
          yarn

          # Upload each question type to Examplary staging
          for dir in */; do
            # Skip if the directory does not contain a question-type config file
            if [ ! -f "$dir/question-type.json" ] && [ ! -f "$dir/question-type.yml" ]; then
              continue
            fi

            # Bundle and upload to Examplary
            cd $dir
            npx @examplary/cli@latest upload --host https://api-staging.examplary.ai
            cd ..
          done

          # Upload each question type to Examplary production
          for dir in */; do
            # Skip if the directory does not contain a question-type config file
            if [ ! -f "$dir/question-type.json" ] && [ ! -f "$dir/question-type.yml" ]; then
              continue
            fi

            # Bundle and upload to Examplary
            cd $dir
            npx @examplary/cli@latest upload
            cd ..
          done
